name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  build-wheels:
    name: Build ${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - {os: ubuntu-latest, target: x86_64,  manylinux: auto}
          - {os: ubuntu-latest, target: aarch64, manylinux: auto}
          # Linux musl
          - {os: ubuntu-latest, target: x86_64,  manylinux: musllinux_1_2}
          - {os: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2}
          # macOS
          - {os: macos-13, target: x86_64, manylinux: auto}
          - {os: macos-14, target: aarch64, manylinux: auto}
          # Windows — only native x86_64; aarch64 cross requires emulation not available
          - {os: windows-latest, target: x86_64, manylinux: auto}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13
          manylinux: ${{ matrix.manylinux }}
          # Never use sccache here — no sccache service is configured
          sccache: 'false'
        env:
          RUSTC_WRAPPER: ""
          SCCACHE_GHA_ENABLED: "false"
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: |
          pip install maturin
          maturin sdist --out dist
        env:
          # Explicitly clear any sccache wrapper — sdist does not compile
          # but maturin runs `cargo metadata` which respects RUSTC_WRAPPER
          RUSTC_WRAPPER: ""
          SCCACHE_GHA_ENABLED: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to ${{ github.event.inputs.test_pypi == 'true' && 'Test PyPI' || 'PyPI' }}
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment:
      name: ${{ github.event.inputs.test_pypi == 'true' && 'test-pypi' || 'pypi' }}
      url: ${{ github.event.inputs.test_pypi == 'true' && 'https://test.pypi.org/p/ulmen' || 'https://pypi.org/p/ulmen' }}
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to Test PyPI
        if: github.event.inputs.test_pypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: github.event.inputs.test_pypi != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
