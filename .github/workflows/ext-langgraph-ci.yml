name: ulmen-langgraph CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - "ulmen/ext/langgraph/**"
      - ".github/workflows/ext-langgraph-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "ulmen/ext/langgraph/**"
      - ".github/workflows/ext-langgraph-ci.yml"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools and dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy langgraph>=1.0.0 langchain-core>=0.1.0

      - name: Ruff
        run: ruff check ulmen/ext/langgraph/

      - name: Mypy
        run: |
          mypy ulmen/ext/langgraph/ \
            --ignore-missing-imports \
            --no-error-summary \
            --check-untyped-defs

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ulmen from source with Rust acceleration
        run: |
          pip install --upgrade pip maturin
          maturin develop --release

      - name: Install extension dependencies
        run: |
          pip install langgraph>=1.0.0 langchain-core>=0.1.0
          pip install pytest pytest-asyncio pytest-cov

      - name: Pytest with coverage
        run: |
          pytest ulmen/ext/langgraph/tests/ \
            --cov=ulmen/ext/langgraph \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            -x
