name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff pyflakes

      - name: ruff check
        run: ruff check lumen/ tests/ --ignore E501,E402

      - name: pyflakes
        run: pyflakes lumen/core.py lumen/__init__.py

  test-python:
    name: Python Tests (no Rust)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v \
            --cov=lumen \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -x

  test-rust:
    name: Python + Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        run: maturin develop --release

      - name: Install test deps
        run: pip install pytest pytest-cov

      - name: Run full test suite
        run: |
          pytest tests/ -v \
            --cov=lumen \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -x

  test-rust-macos:
    name: Python + Rust Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install maturin
      - run: maturin develop --release
      - run: pip install pytest
      - run: pytest tests/ -v -x

  test-rust-windows:
    name: Python + Rust Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install maturin
      - run: maturin develop --release
      - run: pip install pytest
      - run: pytest tests/ -v -x

  cargo-test:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --release